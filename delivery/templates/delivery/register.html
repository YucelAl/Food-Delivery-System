{% extends 'delivery/base.html' %}

{% block content %}
<div class="page-center">
    <div class="card">
        <h1 style="margin-top: 0; text-align: center;">Register</h1>
        <form method="post" class="form-vertical">
            {% csrf_token %}
            <p>
                <label for="id_first_name">First Name</label>
                <input id="id_first_name" type="text" name="first_name" required>
            </p>
            <p>
                <label for="id_last_name">Last Name</label>
                <input id="id_last_name" type="text" name="last_name" required>
            </p>
            <p>
                <label for="id_email">Email</label>
                <input id="id_email" type="email" name="email" required>
            </p>
            <p>
                <label for="id_phone">Phone</label>
                <input id="id_phone" type="text" name="phone" required>
            </p>
            <p>
                <label for="id_address" id="label_address">Address</label>
                <input id="id_address" type="text" name="address" required>
            </p>
            <p>
                <label for="id_user_type">Register As</label>
                <select id="id_user_type" name="user_type" required onchange="updateAddressLabel()">
                    <option value="customer">Customer</option>
                    <option value="driver">Driver</option>
                </select>
            </p>
            <p>
                <label for="id_password">Password</label>
                <input id="id_password" type="password" name="password" required>
            </p>
            <button type="submit">Register</button>
        </form>
    </div>
</div>

<script>
function updateAddressLabel() {
    var userType = document.getElementById("id_user_type").value;
    var label = document.getElementById("label_address");
    if (userType === "driver") {
        label.innerText = "Vehicle Make/Model";
    } else {
        label.innerText = "Address";
    }
}
</script>
{% endblock %}
